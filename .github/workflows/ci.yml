name: CI – tests before deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend test deps
        run: |
          pip install --upgrade pip
          pip install pytest requests playwright

      - name: Backend regression tests (auth + redeploy + e2e smoke)
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$REACT_APP_BACKEND_URL" ]; then
            echo "::warning::DEPLOY_URL secret missing — skipping regression tests."
            exit 0
          fi
          pytest backend/tests/test_auth_routes.py backend/tests/test_redeploy_webhook.py -v -x

      - name: Playwright browsers
        if: success()
        run: |
          python -m playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        if: success()
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          if [ -z "$REACT_APP_BACKEND_URL" ]; then
            echo "::warning::DEPLOY_URL missing — skipping E2E."
            exit 0
          fi
          pytest backend/tests/test_e2e_login.py -v -x

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()
    timeout-minutes: 5
    steps:
      - name: Trigger redeploy webhook
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ] || [ -z "${{ secrets.DEPLOY_SECRET }}" ]; then
            echo "::warning::DEPLOY_URL or DEPLOY_SECRET secret missing — skipping deploy."
            exit 0
          fi
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_URL }}/api/admin/redeploy" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 30 || echo "000")
          echo "HTTP $HTTP"
          cat /tmp/resp.json || true
          [ "$HTTP" = "200" ] || { echo "::error::Redeploy returned HTTP $HTTP"; exit 1; }

      - name: Verify new commit deployed
        if: success()
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then exit 0; fi
          sleep 15
          DEPLOYED=$(curl -s "${{ secrets.DEPLOY_URL }}/api/health" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('commit','?'))" \
            || echo "?")
          EXPECTED="${GITHUB_SHA::7}"
          echo "Expected: $EXPECTED | Deployed: $DEPLOYED"
          [ "$DEPLOYED" = "$EXPECTED" ] && echo "::notice::✅ Commit $EXPECTED is live" || echo "::warning::Mismatch"
